name: Atualizar dados do dashboard

on:
  schedule:
    # 09:00 UTC = 06:00 horario de Brasilia (ajuste se necessario)
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar rclone (script oficial, versao atual)
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Restaurar configuracao do rclone (OneDrive)
        env:
          RCLONE_CONF_CONTENT: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF_CONTENT" | tr -d '\r' > ~/.config/rclone/rclone.conf

      - name: Diagnostico do rclone.conf (sem expor segredos)
        run: |
          rclone version
          echo "SHA256 do arquivo (compare com o hash local):"
          sha256sum ~/.config/rclone/rclone.conf
          echo "Tamanho em bytes:"
          wc -c ~/.config/rclone/rclone.conf
          echo "SHA256 de cada linha individualmente:"
          while IFS= read -r linha; do printf '%s' "$linha" | sha256sum; done < ~/.config/rclone/rclone.conf

      - name: Baixar planilhas do OneDrive
        run: |
          mkdir -p onedrive_sync
          rclone copy "onedrive:Planilhas 2026 - PP-AGN" "onedrive_sync/Planilhas 2026 - PP-AGN" --max-age 60d
          rclone copy "onedrive:Planilhas 2026 - PP-VEL" "onedrive_sync/Planilhas 2026 - PP-VEL" --max-age 60d
          rclone copy "onedrive:Planilhas 2026 - PS-FLC" "onedrive_sync/Planilhas 2026 - PS-FLC" --max-age 60d
          rclone copy "onedrive:Planilhas 2026 - PS-NFA" "onedrive_sync/Planilhas 2026 - PS-NFA" --max-age 60d

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install xlrd openpyxl

      - name: Rodar parser.py
        env:
          ONEDRIVE_BASE: ${{ github.workspace }}/onedrive_sync
        run: python parser.py

      - name: Publicar no Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PROJECT_NAME }}
          directory: site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
